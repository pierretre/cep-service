spring:
  application:
    name: rule-management-api
  
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: cep-engine-consumer
      auto-offset-reset: earliest
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: gemoc.mbdo.cep.api.model.Event
        spring.json.use.type.headers: false
  
  datasource:
    # H2 Configuration (for development)
    # url: jdbc:h2:./data/cep-rules;AUTO_SERVER=TRUE
    # driver-class-name: org.h2.Driver
    # username: sa
    # password: 
    
    # PostgreSQL Configuration (for production with LISTEN/NOTIFY)
    url: jdbc:postgresql://localhost:5432/cep_rules
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  h2:
    console:
      enabled: false
      path: /h2-console

server:
  port: 8081

# OpenAPI/Swagger Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true

logging:
  level:
    root: INFO
