spring:
  application:
    name: rule-management-api
  
  datasource:
    # H2 Configuration (for development)
    # url: jdbc:h2:./data/cep-rules;AUTO_SERVER=TRUE
    # driver-class-name: org.h2.Driver
    # username: sa
    # password: 
    
    # PostgreSQL Configuration (for production with LISTEN/NOTIFY)
    url: jdbc:postgresql://localhost:5432/cep_rules
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  h2:
    console:
      enabled: false
      path: /h2-console

server:
  port: 8081

# OpenAPI/Swagger Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true

# CEP Engine Configuration
cep:
  database:
    # PostgreSQL Configuration
    url: jdbc:postgresql://localhost:5432/cep_rules
    username: postgres
    password: postgres
    # Use LISTEN/NOTIFY instead of polling
    use-postgres-notify: true
  kafka:
    bootstrap-servers: localhost:9092
    topic: REN_1V_01_VGRSystemModel
    group-id: cep-engine-consumer
  # Polling interval (only used if use-postgres-notify is false)
  rule-sync-interval-ms: 5000

logging:
  level:
    root: INFO
    gemoc.mbdo.cep: DEBUG
