<div *ngIf="hoverInfo"
    class="absolute top-0 right-4 bg-white border-2 border-gray-300 rounded-lg shadow-lg p-4 z-10 min-w-[250px]">
    <div class="flex items-center gap-2 mb-2">
        <span class="text-2xl font-bold text-gray-800">{{ hoverInfo.count }}</span>
        <span class="text-sm text-gray-600">related incident{{ hoverInfo.count !== 1 ? 's' : '' }}</span>
    </div>
    <div class="space-y-2">
        <div>
            <label class="text-xs font-medium text-gray-500 uppercase">Severity</label>
            <div class="mt-1">
                <span
                    [class]="'inline-block px-2 py-1 rounded-full text-xs font-medium border ' + getSeverityBadgeClass(hoverInfo.severity)">
                    {{ hoverInfo.severity }}
                </span>
            </div>
        </div>
        <div>
            <label class="text-xs font-medium text-gray-500 uppercase">Rule</label>
            <p class="text-sm text-gray-900 font-medium mt-1">{{ hoverInfo.ruleName }}</p>
        </div>
    </div>
</div>
