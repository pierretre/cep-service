<nav class="bg-white border-b border-gray-200 px-4 py-2.5">
    <div class="flex flex-wrap justify-between items-center">
        <div class="flex items-center">
            <span class="text-2xl font-semibold text-gray-900">{{ title }}</span>
        </div>
        <div class="flex items-center gap-2">
            <div *ngIf="showRoleToggle" class="inline-flex rounded-lg border border-gray-300 overflow-hidden"
                role="group" aria-label="Role selector">
                <button type="button" (click)="onRoleChange('Operational Engineer')" [ngClass]="{
                        'bg-blue-600 text-white': selectedRole === 'Operational Engineer',
                        'bg-white text-gray-900 hover:bg-gray-100': selectedRole !== 'Operational Engineer'
                    }" class="px-4 py-2 text-sm font-medium border-r border-gray-300">
                    Operational Engineer
                </button>
                <button type="button" (click)="onRoleChange('Factory Manager')" [ngClass]="{
                        'bg-blue-600 text-white': selectedRole === 'Factory Manager',
                        'bg-white text-gray-900 hover:bg-gray-100': selectedRole !== 'Factory Manager'
                    }" class="px-4 py-2 text-sm font-medium">
                    Factory Manager
                </button>
            </div>

            <button *ngIf="showExportButton" (click)="onExport()" type="button"
                class="text-gray-900 bg-white border border-gray-300 hover:bg-gray-100 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5">
                <svg class="w-4 h-4 inline-block mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
                Export
            </button>
        </div>
    </div>
</nav>
