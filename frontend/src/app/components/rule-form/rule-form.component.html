<div class="sticky-panel bg-white shadow-lg rounded-lg p-8">
    <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-semibold text-gray-900">{{ formTitle }}</h2>
        <button (click)="onClose()" type="button"
            class="text-gray-400 hover:text-gray-500 focus:outline-none transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </div>

    <!-- Edit Mode: Status Badge and Actions -->
    @if (isEditMode) {
    <div class="mb-6 p-4 bg-gray-50 rounded-lg border border-gray-200">
        <div class="flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <span class="text-sm font-medium text-gray-700">Status:</span>
                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                    [class]="editRule!.active ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800'">
                    {{ editRule!.active ? 'Active' : 'Inactive' }}
                </span>
            </div>
            <button type="button" (click)="onToggleActive()"
                class="inline-flex items-center px-3 py-1.5 border border-gray-300 rounded-md shadow-sm text-xs font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                {{ editRule!.active ? 'Deactivate' : 'Activate' }}
            </button>
        </div>
    </div>
    }

    <form (ngSubmit)="onSubmitRule()" #ruleForm="ngForm" class="space-y-6">
        <!-- Rule Name -->
        <div>
            <label for="ruleName" class="block text-sm font-medium text-gray-700 mb-2">
                Rule Name <span class="text-red-500">*</span>
            </label>
            <input type="text" id="ruleName" name="ruleName" [(ngModel)]="newRule.name" required
                class="block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm"
                placeholder="e.g., High Temperature Alert">
        </div>

        <!-- Description -->
        <div>
            <label for="ruleDescription" class="block text-sm font-medium text-gray-700 mb-2">
                Description
            </label>
            <textarea id="ruleDescription" name="ruleDescription" [(ngModel)]="newRule.description" rows="4"
                class="block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm"
                placeholder="Describe what this rule does..."></textarea>
        </div>

        <!-- Severity -->
        <div>
            <label for="severity" class="block text-sm font-medium text-gray-700 mb-2">
                Severity <span class="text-red-500">*</span>
            </label>
            <select id="severity" name="severity" [(ngModel)]="newRule.severity"
                class="block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm"
                required>
                <option value="Info">Info</option>
                <option value="Warning">Warning</option>
                <option value="Critical">Critical</option>
            </select>
        </div>

        <!-- EPL Query -->
        <div>
            <label for="eplQuery" class="block text-sm font-medium text-gray-700 mb-2">
                EPL Query <span class="text-red-500">*</span>
            </label>
            <textarea id="eplQuery" name="eplQuery" [(ngModel)]="newRule.eplQuery" required rows="8"
                class="block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm font-mono"
                placeholder="select * from Event..."></textarea>
            <p class="mt-2 text-xs text-gray-500">Enter your Esper EPL query</p>
        </div>

        <!-- Active Toggle -->
        <!-- <div class="flex items-center p-4 bg-gray-50 rounded-lg">
            <input type="checkbox" id="ruleActive" name="ruleActive" [(ngModel)]="newRule.active"
                class="h-5 w-5 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
            <label for="ruleActive" class="ml-3 block text-sm font-medium text-gray-700">
                Activate rule immediately
            </label>
        </div> -->

        <!-- Form Actions -->
        <div class="flex gap-3 pt-6 border-t border-gray-200 flex-col">
            <button type="submit" [disabled]="!ruleForm.form.valid || isSubmitting"
                class="flex-1 inline-flex justify-center items-center px-6 py-3 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                @if (isSubmitting) {
                <svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                    </path>
                </svg>
                {{ isEditMode ? 'Updating...' : 'Creating...' }}
                } @else {
                {{ submitButtonText }}
                }
            </button>
            @if (!isEditMode) {
            <button type="button" (click)="resetForm()"
                class="px-6 py-3 border border-gray-300 rounded-lg shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                Reset
            </button>
            } @else {
            <button type="button" (click)="onDeleteRule()" [disabled]="isDeleting"
                class="w-full inline-flex justify-center items-center px-6 py-3 border border-red-300 rounded-lg shadow-sm text-sm font-medium text-red-700 bg-white hover:bg-red-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
                @if (isDeleting) {
                <svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-red-700" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                    </path>
                </svg>
                Deleting...
                } @else {
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                    </path>
                </svg>
                Delete Rule
                }
            </button>
            }
        </div>
    </form>
</div>

<!-- Success/Error Alerts - Fixed at bottom center -->
@if (submitMessage) {
<div class="fixed bottom-8 left-1/2 transform -translate-x-1/2 z-50 w-full max-w-md px-4">
    <div [class]="submitMessage.type === 'success' 
        ? 'flex items-center p-4 text-green-800 border border-green-300 rounded-lg bg-green-50 shadow-lg' 
        : 'flex items-center p-4 text-red-800 border border-red-300 rounded-lg bg-red-50 shadow-lg'" role="alert">
        <svg class="flex-shrink-0 w-4 h-4" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor"
            viewBox="0 0 20 20">
            @if (submitMessage.type === 'success') {
            <path
                d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM9.5 4a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3ZM12 15H8a1 1 0 0 1 0-2h1v-3H8a1 1 0 0 1 0-2h2a1 1 0 0 1 1 1v4h1a1 1 0 0 1 0 2Z" />
            } @else {
            <path
                d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5ZM10 15a1 1 0 1 1 0-2 1 1 0 0 1 0 2Zm1-4a1 1 0 0 1-2 0V6a1 1 0 0 1 2 0v5Z" />
            }
        </svg>
        <span class="sr-only">{{ submitMessage.type === 'success' ? 'Success' : 'Error' }}</span>
        <div class="ms-3 text-sm font-medium">
            {{ submitMessage.text }}
        </div>
        <button type="button" (click)="dismissMessage()"
            [class]="submitMessage.type === 'success'
                ? 'ms-auto -mx-1.5 -my-1.5 bg-green-50 text-green-500 rounded-lg focus:ring-2 focus:ring-green-400 p-1.5 hover:bg-green-200 inline-flex items-center justify-center h-8 w-8'
                : 'ms-auto -mx-1.5 -my-1.5 bg-red-50 text-red-500 rounded-lg focus:ring-2 focus:ring-red-400 p-1.5 hover:bg-red-200 inline-flex items-center justify-center h-8 w-8'"
            aria-label="Close">
            <span class="sr-only">Close</span>
            <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6" />
            </svg>
        </button>
    </div>
</div>
}
