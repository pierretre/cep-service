<aside class="replanning-popup" role="dialog" aria-label="Live replanning incident">
    <div class="popup-header">
        <p class="alert-badge">Live Replanning Incident</p>
        <h3 class="popup-title">{{ incident.message }}</h3>
    </div>

    <div class="popup-body">
        <p>Your action is required to correct the issue and resume normal operations.</p>

        <textarea id="replanningComment" [(ngModel)]="comment"
            placeholder="Describe the corrective action performed on the production line ..."></textarea>

        <button type="button" (click)="onValidateCorrection()" [disabled]="!comment.trim()" class="validate-button">
            Validate Correction
        </button>
    </div>
</aside>
